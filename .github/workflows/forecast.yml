name: Campus Point Forecast

on:
  schedule:
    - cron: '0 * * * *'  # every hour at :00
  workflow_dispatch:       # also allows manual trigger

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install numpy pandas xarray pydap scipy requests

      - name: Run forecast
        run: python forecast.py

      - name: Commit output
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add forecast_output.json forecast_log.csv
          git diff --staged --quiet || git commit -m "forecast update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
